<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Labster Catalog — AI-Enhanced Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="ext-resource-dependency" content="assets/dr-one-icon.png" data-resource-id="drOneIcon" />
<template id="__bundler_thumbnail" data-bg-color="#F6F7F8">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F6F7F8"/>
    <circle cx="600" cy="360" r="120" fill="#006FCC"/>
    <circle cx="555" cy="340" r="14" fill="#FFFFFF"/>
    <circle cx="645" cy="340" r="14" fill="#FFFFFF"/>
    <path d="M540 400 Q600 440 660 400" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round"/>
    <rect x="420" y="520" width="360" height="48" rx="24" fill="#FFFFFF" stroke="#E1E3E6" stroke-width="2"/>
    <rect x="320" y="600" width="160" height="56" rx="14" fill="#FFFFFF" stroke="#E1E3E6" stroke-width="2"/>
    <rect x="500" y="600" width="200" height="56" rx="14" fill="#FFFFFF" stroke="#E1E3E6" stroke-width="2"/>
    <rect x="720" y="600" width="160" height="56" rx="14" fill="#FFFFFF" stroke="#E1E3E6" stroke-width="2"/>
  </svg>
</template>
<link rel="stylesheet" href="app.css"/>
<link rel="stylesheet" href="catalog-ai.css"/>
<link rel="stylesheet" href="doctorone.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.446.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="catalog-ai-data.jsx"></script>
<script type="text/babel" src="doctorone-data.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="catalog.jsx"></script>
<script type="text/babel" src="doctorone.jsx"></script>
<script type="text/babel" src="ux-overlay.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "primaryColor": "#006FCC",
  "showRecommended": true
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState("catalog");
  const [license, setLicense] = useState(window.LP_DATA.LICENSES[0]);
  const [uxOn, setUxOn] = useState(false);
  const tweaks = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const [t, setTweak] = tweaks;

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  useEffect(() => {
    document.documentElement.style.setProperty("--blue-6", t.primaryColor || "#006FCC");
  }, [t.primaryColor]);

  function onAccountAction(action) {
    if (action === "logout") alert("Logged out (demo)");
    else if (action === "settings") setPage("settings");
    else setPage("account");
  }

  return (
    <div className={`app density-${t.density || "comfortable"}`}>
      <window.Sidebar
        active={page}
        onNav={setPage}
        license={license}
        onLicense={setLicense}
        onAccountAction={onAccountAction}
      />
      <main className="app-main">
        {page === "home" && <window.HomePage onNav={setPage}/>}
        {page === "catalog" && <window.CatalogPage/>}
        {page === "admin" && <window.AdminPage/>}
        {page === "account" && <window.AccountPage/>}
        {page === "settings" && <div className="page"><h1 className="page-title">Settings</h1><p style={{color:"var(--grey-8)"}}>Account settings, notifications, language and integrations.</p></div>}
        {page === "create" && <div className="page"><h1 className="page-title">Create a Course</h1><p style={{color:"var(--grey-8)"}}>Course creation flow placeholder.</p></div>}
        {page === "archive" && <div className="page"><h1 className="page-title">Archive</h1><p style={{color:"var(--grey-8)"}}>Past courses and archived content.</p></div>}
      </main>

      {/* UX suggestions overlay removed for AI-catalog prototype */}

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Layout">
            <window.TweakRadio
              label="Density"
              value={t.density}
              options={[{value:"comfortable",label:"Comfortable"},{value:"compact",label:"Compact"}]}
              onChange={v => setTweak("density", v)}/>
            <window.TweakToggle
              label="Show recommended sims on Home"
              value={t.showRecommended}
              onChange={v => setTweak("showRecommended", v)}/>
          </window.TweakSection>
          <window.TweakSection title="Brand">
            <window.TweakColor
              label="Action color"
              value={t.primaryColor}
              onChange={v => setTweak("primaryColor", v)}/>
          </window.TweakSection>
          <window.TweakSection title="Sidebar">
            <window.TweakButton
              label="Reset sidebar order"
              onClick={() => { localStorage.removeItem("lp_sb_order"); window.location.reload(); }}/>
          </window.TweakSection>
          <window.TweakSection title="AI Catalog states">
            <window.TweakButton
              label="Default browse view"
              onClick={() => window.AICatalog && window.AICatalog.browse()}/>
            <window.TweakButton
              label="Open AI search dropdown"
              onClick={() => window.AICatalog && window.AICatalog.openSuggestions("cell div")}/>
            <window.TweakButton
              label="Show natural-language results"
              onClick={() => window.AICatalog && window.AICatalog.nlResults()}/>
            <window.TweakButton
              label="Show zero-result + handoff"
              onClick={() => window.AICatalog && window.AICatalog.zeroResults()}/>
            <window.TweakButton
              label="Open syllabus panel"
              onClick={() => window.AICatalog && window.AICatalog.openSyllabus()}/>
            <window.TweakButton
              label="Open Doctor One assistant"
              onClick={() => window.AICatalog && window.AICatalog.openDrOne()}/>
          </window.TweakSection>
          <window.TweakSection title="Navigation">
            <window.TweakSelect
              label="Jump to page"
              value={page}
              options={[
                {value:"home",label:"Home"},
                {value:"catalog",label:"Catalog"},
                {value:"admin",label:"Admin"},
                {value:"account",label:"My Account"},
              ]}
              onChange={setPage}/>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
