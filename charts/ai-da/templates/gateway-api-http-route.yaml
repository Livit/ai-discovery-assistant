{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.hostname -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "gateway-api.fullname" . }}
spec:
  {{- include "gateway-api.hostnames" . | nindent 2 }}
  {{- include "gateway-api.parent_ref" . | nindent 2 }}
  rules:
    {{- if and .Values.gatewayApi.whitelistCIDRs.enabled .Values.gatewayApi.whitelistCIDRs.prefixes }}
    - backendRefs:
        - name: {{ template "gateway-api.service_name" . }}
          port: {{ template "gateway-api.service_port" . }}
      timeouts:
        {{- .Values.gatewayApi.httpRoute.timeouts | toYaml | nindent 8  }}
      filters:
        {{- include "gateway-api.filters" . | nindent 6 }}
        - type: ExtensionRef
          extensionRef:
            group: gateway.kgateway.dev
            kind: TrafficPolicy
            name: {{ template "gateway-api.fullname" . }}-whitelist
      matches:
        {{- range $prefix := .Values.gatewayApi.whitelistCIDRs.prefixes }}
        - path:
            type: {{ $prefix.type | quote }}
            value: {{ $prefix.value | quote }}
        {{- end }}
    {{- end }}
    {{- if .Values.gatewayApi.httpRoute.prefixes }}
    - backendRefs:
        - name: {{ template "gateway-api.service_name" . }}
          port: {{ template "gateway-api.service_port" . }}
      timeouts:
        {{- .Values.gatewayApi.httpRoute.timeouts | toYaml | nindent 8  }}
      filters:
        {{- include "gateway-api.filters" . | nindent 6 }}
      matches:
        {{- range $prefix := .Values.gatewayApi.httpRoute.prefixes }}
        - path:
            type: {{ $prefix.type | quote }}
            value: {{ $prefix.value | quote }}
        {{- end }}
    {{- end }}
{{- end -}}
