{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.hostname .Values.gatewayApi.httpsRedirect.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "gateway-api.fullname" . }}-https-redirect
spec:
  parentRefs:
    {{- list .Values.gatewayApi.httpsRedirect.parentRef | toYaml | nindent 4 }}
  {{- include "gateway-api.hostnames" . | nindent 2 }}
  rules:
    - filters:
      - type: RequestRedirect
        requestRedirect:
          scheme: https
          statusCode: 301
{{- end -}}
