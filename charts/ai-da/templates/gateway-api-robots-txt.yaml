{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.hostname .Values.gatewayApi.robotsTxt.enabled .Values.gatewayApi.robotsTxt.content -}}
apiVersion: gateway.kgateway.dev/v1alpha1
kind: DirectResponse
metadata:
  name: {{ template "gateway-api.fullname" . }}-robots-txt
spec:
  status: 200
  body: |
{{- .Values.gatewayApi.robotsTxt.content | nindent 4 }}

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "gateway-api.fullname" . }}-robots-txt
spec:
  {{- include "gateway-api.hostnames" . | nindent 2 }}
  {{- include "gateway-api.parent_ref" . | nindent 2 }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /robots.txt
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.kgateway.dev
        kind: DirectResponse
        name: {{ template "gateway-api.fullname" . }}-robots-txt
{{- end -}}
