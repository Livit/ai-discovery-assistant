{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.hostname .Values.gatewayApi.trafficPolicy.enabled .Values.gatewayApi.trafficPolicy.spec -}}
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: {{ template "gateway-api.fullname" . }}
spec: 
  {{- toYaml .Values.gatewayApi.trafficPolicy.spec | nindent 2 }}
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ template "gateway-api.fullname" . }}
{{- end -}}
